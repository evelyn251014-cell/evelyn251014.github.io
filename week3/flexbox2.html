<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exe.2 - flexbox2.html</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgba(252, 252, 252);
            margin: 90px;
        }

        div {
            font-size: 20px;
        }

        div.header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        div.logo {
            display: flex;
            gap: 10px;
            font-size: 40px;
            font-weight: bold;
        }

        div.navigationbar {
            display: flex;
            font-size: 20px;
            align-items: center;
            gap: 40px;
        }

        div.request {
            border: 1px solid black;
            padding: 20px 30px;
            border-radius: 14px;
            gap: 10px;
        }

        div.content {
            display: flex;
            margin-top: 50px;
            align-items: center;
            justify-content: space-between;
        }

        div.title {
            width: 50%
        }

        h1 {
            max-width: 550px;
            font-size: 60px;
            line-height: 1.5;
        }

        p {
            max-width: 450px;
            font-size: 20px;
            line-height: 1.5;
        }

        button.booking {
            background-color: black;
            color: white;
            border-radius: 14px;
            margin-top: 20px;
            padding: 20px 35px;
            font-size: 20px;
        }

        div.speaker {
            margin-top: 30px;

        }

        div.brands {
            display: flex;
            justify-content: space-around;
            gap: 10px;
            padding: 50px;
            margin-top: 50px;
        }
    </style>
</head>

<body>
    <div>
        <div class="header">
            <div class="logo">
                <img src="images/Icon.png" alt="Postivus Logo" width="50px">Postivus
            </div>
            <div class="navigationbar">
                <div class="about">About us</div>
                <div class="services"> Services</div>
                <div class="cases"> Use Cases</div>
                <div class="price">Pricing</div>
                <div class="blog">Blog</div>

                <div class="request">Request a quote</div>
            </div>
        </div>
    </div>
    <div class="content">
        <div class="title">
            <h1>Navigating the digital landscape for success</h1>

            <p>Our digital marketing agency helps businesses grow and succeed online through a range of services
                including
                SE0,
                social media marketing, and content creation.</p>
            <button class="booking">Book a consultation</button>
        </div>
        <div class="speaker">
            <img src="images/Illustration.png" alt="illustration" width="100%" height="auto">
        </div>
    </div>

    <div class="brands">
        <div> <img src="images/Company logo (1).png" alt="Amazon" width="100%"></div>
        <div> <img src="images/Company logo (2).png " alt="Dribble" width="100%"></div>
        <div><img src="images/Company logo (3).png" alt="Hubspot" width="100%"></div>
        <div><img src="images/Company logo (3).png" alt="Hubspot" width="100%"></div>
        <div> <img src="images/Company logo (5).png" alt="Neflix" width="100%"></div>
        <div> <img src="images/Company logo (6).png " alt="Zoom" width="100%"></div>
    </div>
</body>

</html>
